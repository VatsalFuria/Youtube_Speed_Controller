<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Speed Control</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-shell: radial-gradient(circle at top, rgba(130, 158, 153, 0.18), transparent 44%),
          linear-gradient(160deg, #1b2125 0%, #111518 100%);
        --card-bg: rgba(25, 31, 35, 0.78);
        --card-border: rgba(255, 255, 255, 0.12);
        --text-primary: #f4f0ea;
        --text-secondary: #b3bab5;
        --accent: #9ab5ab;
        --accent-strong: #c3d3cb;
        --track: rgba(255, 255, 255, 0.12);
        --button-bg: rgba(255, 255, 255, 0.08);
        --button-border: rgba(255, 255, 255, 0.1);
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg-shell);
        color: var(--text-primary);
        font-family: "Segoe UI Variable Display", "Aptos", "Inter", sans-serif;
        padding: 14px;
        margin: 0;
        width: 340px;
        min-height: 320px;
        max-height: 560px;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .panel {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 18px;
        border: 1px solid var(--card-border);
        border-radius: 22px;
        background: var(--card-bg);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      body::-webkit-scrollbar {
        width: 10px;
      }

      body::-webkit-scrollbar-track {
        background: transparent;
      }

      body::-webkit-scrollbar-thumb {
        border: 2px solid transparent;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.16);
        background-clip: padding-box;
      }

      body::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.24);
        background-clip: padding-box;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), transparent 28%);
        pointer-events: none;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--text-secondary);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      .subtext {
        margin: 6px 0 0;
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.4;
      }

      .status-chip {
        flex-shrink: 0;
        padding: 8px 11px;
        border: 1px solid rgba(154, 181, 171, 0.18);
        border-radius: 999px;
        background: rgba(154, 181, 171, 0.12);
        color: var(--accent-strong);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .readout {
        padding: 16px 16px 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      }

      .readout-label {
        margin: 0 0 8px;
        color: var(--text-secondary);
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      #speed-slider {
        width: 100%;
        height: 6px;
        margin: 0;
        appearance: none;
        border-radius: 999px;
        outline: none;
        background: linear-gradient(
          90deg,
          var(--accent) 0%,
          var(--accent) var(--slider-fill, 14.3%),
          var(--track) var(--slider-fill, 14.3%),
          var(--track) 100%
        );
      }

      #speed-slider::-webkit-slider-runnable-track {
        height: 6px;
        border-radius: 999px;
      }

      #speed-slider::-webkit-slider-thumb {
        appearance: none;
        width: 20px;
        height: 20px;
        margin-top: -7px;
        border-radius: 50%;
        background: #f5f1ea;
        border: 2px solid rgba(17, 21, 24, 0.78);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      #speed-slider::-moz-range-track {
        height: 6px;
        border: none;
        border-radius: 999px;
        background: var(--track);
      }

      #speed-slider::-moz-range-progress {
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }

      #speed-slider::-moz-range-thumb {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(17, 21, 24, 0.78);
        border-radius: 50%;
        background: #f5f1ea;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
        cursor: pointer;
      }

      #speed-value {
        font-size: 38px;
        line-height: 1;
        margin: 0;
        font-weight: 600;
        letter-spacing: -0.05em;
      }

      .slider-section {
        display: grid;
        gap: 12px;
      }

      .slider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-secondary);
        font-size: 12px;
      }

      .slider-label {
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .slider-range {
        color: rgba(244, 240, 234, 0.7);
      }

      .scale {
        display: flex;
        justify-content: space-between;
        color: rgba(244, 240, 234, 0.45);
        font-size: 11px;
      }

      button {
        border: 1px solid var(--button-border);
        border-radius: 14px;
        color: var(--text-primary);
        cursor: pointer;
        font: inherit;
        transition:
          background-color 0.2s ease,
          border-color 0.2s ease,
          transform 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .button-container {
        display: flex;
        gap: 10px;
      }

      .button-container button {
        flex: 1;
        padding: 14px 12px;
        background: linear-gradient(180deg, rgba(154, 181, 171, 0.18), rgba(154, 181, 171, 0.1));
        border-color: rgba(154, 181, 171, 0.22);
        font-size: 15px;
        font-weight: 600;
      }

      .button-container button:hover {
        background: linear-gradient(180deg, rgba(154, 181, 171, 0.24), rgba(154, 181, 171, 0.14));
        border-color: rgba(195, 211, 203, 0.28);
      }

      .preset-section {
        display: grid;
        gap: 10px;
      }

      .section-label {
        color: var(--text-secondary);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .preset-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      .preset-button {
        padding: 10px 8px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
      }

      .preset-button:hover,
      .preset-button.is-active {
        background: rgba(154, 181, 171, 0.18);
        border-color: rgba(195, 211, 203, 0.28);
        color: var(--text-primary);
      }

      .settings {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        overflow: hidden;
      }

      .settings summary {
        display: flex;
        justify-content: space-between;
        align-items: center;
        list-style: none;
        cursor: pointer;
        padding: 12px 14px;
        color: var(--text-primary);
        font-size: 13px;
        font-weight: 600;
      }

      .settings summary::-webkit-details-marker {
        display: none;
      }

      .settings summary::after {
        content: "+";
        color: var(--text-secondary);
        font-size: 18px;
        line-height: 1;
      }

      .settings[open] summary::after {
        content: "-";
      }

      .settings-body {
        display: grid;
        gap: 12px;
        padding: 0 14px 14px;
      }

      .settings-copy {
        margin: 0;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.4;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--text-secondary);
        font-size: 12px;
      }

      .field input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-primary);
        font: inherit;
      }

      .field input:focus {
        outline: none;
        border-color: rgba(154, 181, 171, 0.36);
      }

      .field input.is-invalid {
        border-color: rgba(225, 140, 140, 0.64);
        background: rgba(225, 140, 140, 0.08);
      }

      .field-hint {
        color: rgba(244, 240, 234, 0.45);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <section class="header">
        <div>
          <!-- <p class="eyebrow">YouTube Controller</p> -->
          <h1>Playback Speed</h1>
          <!-- <p class="subtext">Refined controls for precise adjustments on the current video.</p> -->
        </div>
        <!-- <div class="status-chip">Live</div> -->
      </section>

      <section class="readout" aria-live="polite">
        <p class="readout-label">Current Speed</p>
        <div id="speed-value">1.0x</div>
      </section>

      <section class="slider-section">
        <div class="slider-header">
          <label class="slider-label" for="speed-slider">Adjust speed</label>
          <span class="slider-range">0.5x to 4.0x</span>
        </div>
        <input
          type="range"
          id="speed-slider"
          min="0.5"
          max="4.0"
          step="0.1"
          value="1.0"
        />
        <div class="scale" aria-hidden="true">
          <span>0.5x</span>
          <span>1x</span>
          <span>2x</span>
          <span>4x</span>
        </div>
      </section>

      <section class="preset-section">
        <div class="section-label">Presets</div>
        <div class="preset-grid" id="preset-grid"></div>
      </section>

      <div class="button-container">
        <button id="minus0.5-btn">- 0.5x</button>
        <button id="plus0.5-btn">+ 0.5x</button>
      </div>

      <details class="settings">
        <summary>Speed Settings</summary>
        <div class="settings-body">
          <p class="settings-copy">Startup speed follows the last speed you used. Set the allowed range for the slider</p>
          <div class="field-grid">
            <div class="field">
              <label for="min-speed-input">Minimum speed</label>
              <input
                id="min-speed-input"
                type="number"
                min="0.5"
                max="4.0"
                step="0.1"
                inputmode="decimal"
              />
            </div>
            <div class="field">
              <label for="max-speed-input">Maximum speed</label>
              <input
                id="max-speed-input"
                type="number"
                min="0.5"
                max="4.0"
                step="0.1"
                inputmode="decimal"
              />
            </div>
          </div>
          <div class="field-hint" id="settings-hint">Allowed range is 0.5x to 6x </div>
        </div>
      </details>
    </main>

    <script src="common.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
